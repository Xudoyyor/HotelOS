spring.application.name=dashboard-service
server.port=8086
spring.rabbitmq.host=rabbitmq

# Swagger UI path (Lokalda tekshirish uchun: http://localhost:PORT/swagger-ui.html)
springdoc.swagger-ui.path=/swagger-ui.html
# API hujjatlarining JSON formati manzili
# Ichki servis springdoc'ga o'zining asosiy prefiksini tushuntiradi
springdoc.api-docs.path=/api/auth/v3/api-docs